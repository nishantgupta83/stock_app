name: pulsecheck

# Hourly system-health pulse. Each pulsecheck owns a defined scope; no
# pulsecheck queries another's bucket. Shared preconditions (Supabase
# reachable, recent bars) live in pulsecheck_foundation and downstream
# checks declare needs: foundation so a foundation outage doesn't
# generate cascading false alarms.
#
# Safety: this workflow has no user-provided inputs (no workflow_dispatch
# inputs, no event payloads consumed). All env values come from repo
# secrets or workflow-defined literals.

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

concurrency:
  group: pulsecheck
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run foundation pulsecheck
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONPATH:           agents
        run: python agents/pulsecheck/foundation.py

  thesis:
    needs: foundation
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
