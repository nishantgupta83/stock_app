name: price_agent

# Reconciles open signals + paper trades against actual closing prices.
# Cadence (2026-06-02 bump): every 2h on weekdays. Previously once daily
# (30 21 * * 1-5) which left transient yfinance failures uncorrected for
# 24h+ — the 513-stuck-h1d incident traced to this. The 2h cadence catches
# both intraday catch-up runs AND post-close (21:00 UTC) settlement.
# Safety: only repo secrets used; no untrusted user input interpolated into shell.

on:
  schedule:
    - cron: "0 */2 * * 1-5"
  workflow_dispatch:

concurrency:
  group: price_agent
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Record workflow start
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/ops_recorder.py --phase start --agent workflow_price_agent

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run price agent
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agents/price_agent.py
      - name: Record workflow finish
        if: always()
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WORKFLOW_STATUS:      ${{ job.status }}
        run: python agents/ops_recorder.py --phase finish --agent workflow_price_agent --status "$WORKFLOW_STATUS"
