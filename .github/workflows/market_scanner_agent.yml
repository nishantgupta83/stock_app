name: market_scanner_agent

# Weekday EOD: scan tracked stocks for >=3% daily moves and record prior 2-day events as candidate causes.
# Output goes to stock_event_outcome_observations (observation-only, does NOT
# change scoring weights; aggregates inform future calibration of thesis_agent).

on:
  schedule:
    - cron: "30 21 * * 1-5"  # weekdays 21:30 UTC (after US market close)
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Days of history to replay (0 = today only). Use 90 to seed."
        type: string
        required: false
        default: "0"

concurrency:
  group: market_scanner_agent
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/ops_recorder.py --phase start --agent workflow_market_scanner_agent

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run market scanner
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BACKFILL_DAYS:        ${{ inputs.backfill_days }}
        run: |
          # BACKFILL_DAYS comes from workflow_dispatch input (string), default "0".
          # Validate strictly numeric to block any shell-injection via the env var.
          BACKFILL_DAYS="${BACKFILL_DAYS:-0}"
          case "$BACKFILL_DAYS" in
            ''|*[!0-9]*) echo "invalid backfill_days: $BACKFILL_DAYS"; exit 1 ;;
          esac
          if [ "$BACKFILL_DAYS" -gt 0 ]; then
            python agents/market_scanner_agent.py --backfill-days "$BACKFILL_DAYS"
          else
            python agents/market_scanner_agent.py
          fi
      - name: Record workflow finish
        if: always()
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WORKFLOW_STATUS:      ${{ job.status }}
        run: python agents/ops_recorder.py --phase finish --agent workflow_market_scanner_agent --status "$WORKFLOW_STATUS"
