name: site_generator_retry

# Out-of-band retry for site_generator hard failures.
#
# Background: site_generator's FTPS deploy to Hostinger occasionally hits
# control-socket timeouts. The job already retries 3x in-line, but those
# attempts are all within the same ~10-min window so a longer Hostinger
# blip burns all three. This workflow waits 5 min (giving Hostinger time
# to recover) and re-dispatches site_generator.
#
# Loop break: we only retry when the failed run came from schedule or
# workflow_run. Failures from workflow_dispatch are NOT retried — that
# prevents a failing retry from triggering another retry indefinitely.

on:
  workflow_run:
    workflows: [site_generator]
    types: [completed]
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  retry:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Log triggering failure
        env:
          ORIG_ID:    ${{ github.event.workflow_run.id }}
          ORIG_EVENT: ${{ github.event.workflow_run.event }}
          ORIG_URL:   ${{ github.event.workflow_run.html_url }}
        run: |
          echo "Triggering failed run:"
          echo "  id:    $ORIG_ID"
          echo "  event: $ORIG_EVENT"
          echo "  url:   $ORIG_URL"

      - name: Wait 5 min for transient outage to clear
        run: sleep 300

      - name: Re-dispatch site_generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/actions/workflows/site_generator.yml/dispatches" \
            -f ref=main
          echo "Re-dispatched site_generator on main"
