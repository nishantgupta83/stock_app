name: site_generator

# Generates static HTML dashboard from Supabase data.
# Auto-deploys generated dist/ to Hostinger via FTPS.
# Requires secrets: HOSTINGER_FTP_USER, HOSTINGER_FTP_PASS
# Safety: no untrusted PR/issue inputs are interpolated into shell.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: site_generator
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/ops_recorder.py --phase start --agent workflow_site_generator

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/site_generator.py

      # FTPS deploy with up to 3 attempts. Hostinger's FTPS control socket
      # times out intermittently (~10% of runs). Cascading if-conditions only
      # fire each attempt when the prior one failed; on first-try success the
      # later steps no-op via `if: failure()`. Worst-case 3*120s = 6 min still
      # under the workflow's timeout-minutes: 8 budget.
      - name: Deploy to Hostinger via FTPS (attempt 1)
        id: deploy1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          # FTP user u832160935.stock_app is chrooted DIRECTLY at the served
          # folder /public_html/stock_app/. Verified by curl listing showing
          # index.html / styles.css at the FTP root. So server-dir is ./.
          server-dir:      ./
          dangerous-clean-slate: false

      - name: Deploy to Hostinger via FTPS (attempt 2 — only if attempt 1 failed)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          server-dir:      ./
          dangerous-clean-slate: false

      - name: Deploy to Hostinger via FTPS (attempt 3 — only if 1 and 2 failed)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        # NO continue-on-error — third failure should fail the workflow
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          server-dir:      ./
          dangerous-clean-slate: false
      - name: Record workflow finish
        if: always()
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WORKFLOW_STATUS:      ${{ job.status }}
        run: python agents/ops_recorder.py --phase finish --agent workflow_site_generator --status "$WORKFLOW_STATUS"
