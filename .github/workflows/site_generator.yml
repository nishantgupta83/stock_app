name: site_generator

# Generates static HTML dashboard from Supabase data.
# Auto-deploys generated dist/ to Hostinger via FTPS.
# Requires secrets: HOSTINGER_FTP_USER, HOSTINGER_FTP_PASS
# Safety: no untrusted PR/issue inputs are interpolated into shell.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: site_generator
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/site_generator.py

      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          # FTP user u832160935.stock_app is chrooted DIRECTLY at the served
          # folder /public_html/stock_app/. Verified by curl listing showing
          # index.html / styles.css at the FTP root. So server-dir is ./.
          server-dir:      ./
          dangerous-clean-slate: false
