name: site_generator

# Generates static HTML dashboard from Supabase data.
# Auto-deploys generated dist/ to Hostinger via FTPS.
# Requires secrets: HOSTINGER_FTP_USER, HOSTINGER_FTP_PASS
# Safety: no untrusted PR/issue inputs are interpolated into shell.

on:
  # Primary cadence — cron is best-effort on GitHub Actions and can drift
  # by 30-60 min during high load (observed 2026-05-12: 1h 55min skipped).
  # workflow_run below provides event-driven refresh after each upstream
  # data-producer completes, so status.json stays fresh even when cron
  # is throttled. Cron remains as a baseline for fully-idle periods.
  # No untrusted inputs used — workflow_run filters by hardcoded names + main branch.
  schedule:
    # Cadence cut to EOD-only 2026-06-04 (was */15 + 7-workflow workflow_run).
    # Rationale:
    #   * Supabase free-tier egress is 5 GB/month; we were at ~465 MB/day
    #     with site_generator the single largest consumer (~3,000 GET/day
    #     across ~96 runs/day × 32 GET calls per run).
    #   * Telegram is the realtime path for alerts. The dashboard is the
    #     end-of-day reflection layer — and during this discipline phase
    #     Layer 2 is silent most of the session anyway, so intraday
    #     freshness delivered little marginal value while costing ~95% of
    #     L6's egress.
    #   * 22:00 UTC = 6 PM ET, ~2h after US market close. Bars settled,
    #     EOD price_agent reconcile usually done by then. One refresh
    #     per day captures the day's full state.
    #   * Operator can workflow_dispatch a manual refresh at any time
    #     (e.g. weekend market-news review).
    # workflow_run on upstream completion DROPPED entirely — Telegram is
    # the realtime channel; site_generator no longer chases every event.
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: site_generator
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # wrangler install + Pages upload on top of worst-case FTPS
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Record workflow start
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/ops_recorder.py --phase start --agent workflow_site_generator

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DASHBOARD_PIN:        ${{ secrets.DASHBOARD_PIN }}
        run: python agents/site_generator.py

      # FTPS deploy with up to 3 attempts. Hostinger's FTPS control socket
      # times out intermittently (~10% of runs). Cascading if-conditions only
      # fire each attempt when the prior one failed; on first-try success the
      # later steps no-op via `if: failure()`. Worst-case 3*120s = 6 min still
      # under the workflow's timeout-minutes: 8 budget.
      # PRIMARY publish target: Cloudflare Pages (atomic, versioned, instant
      # rollback). Fatal on failure — the dashboard's home is pages.dev now.
      # Account pinned: the CI token is scoped to the Nishugupta account only.
      - name: Deploy to Cloudflare Pages (primary)
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist/ --project-name=hub4apps-stock --branch=main

      # FALLBACK publish target: Hostinger via FTPS (kept during the
      # observation window; decommission gate = >=5 green dual-publish days).
      # All three attempts are now non-fatal — a Hostinger flake must not fail
      # a run whose primary (Pages) deploy succeeded. Consequence: the
      # site_generator_retry.yml no longer fires on FTPS flakes; Hostinger is
      # best-effort and self-heals on the next scheduled run.
      - name: Deploy to Hostinger via FTPS (attempt 1)
        id: deploy1
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        continue-on-error: true
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          # FTP user u832160935.stock_app is chrooted DIRECTLY at the served
          # folder /public_html/stock_app/. Verified by curl listing showing
          # index.html / styles.css at the FTP root. So server-dir is ./.
          server-dir:      ./
          dangerous-clean-slate: false

      - name: Deploy to Hostinger via FTPS (attempt 2 — only if attempt 1 failed)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        continue-on-error: true
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          server-dir:      ./
          dangerous-clean-slate: false

      - name: Deploy to Hostinger via FTPS (attempt 3 — only if 1 and 2 failed)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        # non-fatal since Pages became the primary target (2026-07-14):
        # Hostinger is fallback-only; its flake must not fail a good Pages run.
        continue-on-error: true
        with:
          server:          ftp.hub4apps.com
          username:        ${{ secrets.HOSTINGER_FTP_USER }}
          password:        ${{ secrets.HOSTINGER_FTP_PASS }}
          protocol:        ftps
          port:            21
          timeout:         120000
          local-dir:       ./dist/
          server-dir:      ./
          dangerous-clean-slate: false
      # Post-deploy smoke test (D5). The 3-attempt FTPS retry can silently
      # "succeed" if some files upload and others time out, producing a
      # dashboard where index.html shows today's data but agents.html still
      # carries last week's. We confirm every tab has the same git_sha meta
      # tag — site_generator embeds it from GITHUB_SHA. Mismatch = partial
      # deploy → fail the workflow so site_generator_retry.yml picks it up.
      #
      # Only $EXPECTED_SHA (from secrets-free github.sha) reaches the shell —
      # never untrusted user inputs.
      # D5 smoke against the PRIMARY target (Cloudflare Pages) — FATAL.
      # Pages deploys are atomic so partial-upload risk is ~nil, but this also
      # catches a deploy that silently landed on the wrong project/account.
      # Note: Pages serves dist/ at the ROOT (no /stock_app prefix) and
      # normalizes /tab.html -> /tab via 308; curl -L follows it.
      - name: Post-deploy smoke test — Cloudflare Pages (D5, fatal)
        env:
          EXPECTED_SHA: ${{ github.sha }}
          # Basic-auth for the _worker.js gate (format "stock:<password>").
          # Zero Trust/Access was deliberately NOT used — its activation
          # requires a payment method on file; the _worker.js gate stays in
          # the cardless free tier. Empty until the secret exists — the gate
          # is fail-open pre-configuration, so omitting is correct.
          DASH_BASIC_AUTH: ${{ secrets.DASH_BASIC_AUTH }}
        run: |
          set -eo pipefail
          BASE="https://hub4apps-stock.pages.dev"
          EXPECTED="${EXPECTED_SHA:0:12}"
          HDRS=()
          if [ -n "$DASH_BASIC_AUTH" ]; then
            HDRS=(-u "$DASH_BASIC_AUTH")
            echo "(authenticating smoke via basic auth)"
          fi
          # Pages deploys are atomic at the origin, but colo caches converge
          # over ~seconds-minutes (observed: 2/10 tabs stale 30s post-deploy).
          # Retry until convergence instead of failing on the race; a REAL
          # broken deploy (wrong project/account) never converges and still
          # fails after the budget.
          echo "Expecting git_sha=$EXPECTED on every tab at $BASE"
          for attempt in 1 2 3 4 5; do
            fail=0
            for tab in index signals events trade_setups risk_decisions agents backtest paper_trades calibration learning; do
              html=$(curl -fsSL --max-time 30 -H 'Cache-Control: no-cache' "${HDRS[@]}" "$BASE/$tab.html" || echo "")
              got=$(printf "%s" "$html" | grep -oE 'name="git_sha" content="[^"]*"' | head -1 | grep -oE 'content="[^"]*"' | sed 's/content="//; s/"//' || true)
              if [ "$got" != "$EXPECTED" ]; then
                echo "  X $tab.html - got '$got' expected '$EXPECTED' (attempt $attempt)"
                fail=$((fail + 1))
              fi
            done
            if [ "$fail" -eq 0 ]; then
              echo "All tabs match expected git_sha on Pages (attempt $attempt) - primary deploy verified."
              exit 0
            fi
            echo "  $fail tab(s) not converged on attempt $attempt; retrying in 25s..."
            sleep 25
          done
          echo "$fail tabs still stale after 5 attempts (~2 min) - deploy broken"
          exit 1

      # D5 smoke against the FALLBACK target (Hostinger) — INFORMATIONAL.
      # Partial FTPS uploads still get surfaced in the log, but no longer fail
      # the run (Pages is primary; Hostinger self-heals next scheduled run).
      - name: Post-deploy smoke test — Hostinger (informational)
        continue-on-error: true
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -eo pipefail
          BASE="https://hub4apps.com/stock_app"
          EXPECTED="${EXPECTED_SHA:0:12}"
          echo "Expecting git_sha=$EXPECTED on every tab at $BASE"
          fail=0
          for tab in index signals events trade_setups risk_decisions agents backtest paper_trades calibration learning; do
            html=$(curl -fsSL --max-time 30 "$BASE/$tab.html" || echo "")
            got=$(printf "%s" "$html" | grep -oE 'name="git_sha" content="[^"]*"' | head -1 | grep -oE 'content="[^"]*"' | sed 's/content="//; s/"//' || true)
            if [ "$got" != "$EXPECTED" ]; then
              echo "  X $tab.html - got '$got' expected '$EXPECTED'"
              fail=$((fail + 1))
            else
              echo "  ok $tab.html"
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "$fail tabs stale on Hostinger (fallback) - will self-heal next run"
            exit 1
          fi
          echo "Hostinger fallback matches too."

      - name: Record workflow finish
        if: always()
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WORKFLOW_STATUS:      ${{ job.status }}
        run: python agents/ops_recorder.py --phase finish --agent workflow_site_generator --status "$WORKFLOW_STATUS"
