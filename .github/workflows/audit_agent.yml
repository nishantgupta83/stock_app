name: audit_agent

# C2: daily pipeline-invariant audit. Runs after the overnight learning
# cycle, checks 5 cross-table integrity invariants, alerts via Telegram on
# any failure. Read-only — does not mutate data tables.
#
# Safety: only repo secrets via env: and job.status (sanitized) are
# interpolated. No untrusted user inputs reach any run: command.

on:
  schedule:
    - cron: "0 4 * * *"     # 04:00 UTC daily
  workflow_dispatch:

concurrency:
  group: audit_agent
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python agents/ops_recorder.py --phase start --agent workflow_audit_agent
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run audit
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agents/audit_agent.py
      - name: Record workflow finish
        if: always()
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WORKFLOW_STATUS:      ${{ job.status }}
        run: python agents/ops_recorder.py --phase finish --agent workflow_audit_agent --status "$WORKFLOW_STATUS"
